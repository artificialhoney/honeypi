services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    # devices:
      # - /dev/video0:/dev/video0
    volumes:
      - ${HONEYPI_MEDIAMTX_CONFIG:-./config}/mediamtx.yml:/mediamtx.yml
      - ${HONEYPI_MEDIAMTX_CONFIG}/server.crt:/server.crt
      - ${HONEYPI_MEDIAMTX_CONFIG}/server.key:/server.key
    extends:
      file: ../../commons/compose.yml
      service: base

