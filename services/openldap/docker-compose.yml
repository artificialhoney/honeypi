services:
  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      - ${HONEYPI_HOME}/openldap/ldap:/data/var/lib/ldap
      - ${HONEYPI_HOME}/openldap/slapd.d:/etc/ldap/slapd.d
      - ${HONEYPI_HOME}/openldap/certs:/container/service/slapd/assets/certs
    extends:
      file: ../../commons/compose.yml
      service: base
