services:
  rpiplay:
    image: rpiplay:${HONEYPI_APP_VERSION:-latest}
    container_name: rpiplay
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    build: .
    extends:
      file: ../../commons/compose.yml
      service: base
    devices:
      - /dev/dri
      - /dev/vchiq
    group_add:
      - video
      - audio
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /var/run/avahi-daemon:/var/run/avahi-daemon
      - /host/run/dbus/system_bus_socket:/host/run/dbus/system_bus_socket
    env_file:
      - ./service.env
