services:
  rpiplay:
    image: rpiplay:${HONEYPI_APP_VERSION:-latest}
    container_name: rpiplay
    restart: unless-stopped
    build: .
    extends:
      file: ../../commons/compose.yml
      service: base
    devices:
      - /dev/dri
      - /dev/vchiq
    group_add:
      - video
      - audio
    environment: 
        - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/host/run/dbus/system_bus_socket