services:
  rpiplay:
    image: rpiplay:${HONEYPI_APP_VERSION:-latest}
    container_name: rpiplay
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    build: .
    extends:
      file: ../../commons/compose.yml
      service: base
    volumes:
      - /var/run/dbus/:/var/run/dbus/
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket