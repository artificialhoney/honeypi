services:
  mastodon-web:
    image: ghcr.io/mastodon/mastodon:${HONEYPI_APP_VERSION:-latest}
    restart: unless-stopped
    container_name: mastodon-web
    command: bundle exec puma -C config/puma.rb
    volumes:
      - ${HONEYPI_HOME}/mastodon/public/system:/mastodon/public/system
    extends:
      file: ../../commons/compose.yml
      service: base
    env_file:
      - ./service.env
  mastodon-streaming:
    image: ghcr.io/mastodon/mastodon-streaming:${HONEYPI_APP_VERSION:-latest}
    restart: unless-stopped
    container_name: mastodon-streaming
    command: node ./streaming/index.js
    extends:
      file: ../../commons/compose.yml
      service: base
    env_file:
      - ./service.env
  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:${HONEYPI_APP_VERSION:-latest}
    restart: unless-stopped
    container_name: mastodon-sidekiq
    command: bundle exec sidekiq
    volumes:
      - ${HONEYPI_HOME}/mastodon/public/system:/mastodon/public/system
    extends:
      file: ../../commons/compose.yml
      service: base
    env_file:
      - ./service.env