services:
  postgres:
    image: postgres
    container_name: postgres
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - ${HONEYPI_HOME}/postgres/data:/var/lib/postgresql/data
      - ${HONEYPI_CONFIG}/postgres/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    extends:
      file: ../../commons/compose.yml
      service: base
    
