services:
  archivebox:
    image: archivebox/archivebox:${HONEYPI_ARCHIVEBOX_VERSION:-latest}
    container_name: archivebox
    volumes:
      - ${HONEYPI_DATA}/archivebox/data:/data
    env_file:
      - ${HONEYPI_HOME}/services/archivebox/service.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.authentik.rule=Host(`${HONEYPI_ARCHIVEBOX_HOST}`)
      - traefik.http.routers.authentik.entrypoints=websecure
      - traefik.http.routers.authentik.tls.certresolver=resolver
      - traefik.http.routers.authentik.service=authentik
      - traefik.http.services.authentik.loadbalancer.server.port=8000
  archivebox-scheduler:
    image: archivebox/archivebox:${HONEYPI_ARCHIVEBOX_VERSION:-latest}
    container_name: archivebox-scheduler
    command: schedule --foreground --update --every=day
    environment:
      - TIMEOUT=120
    volumes:
      - ${HONEYPI_DATA}/archivebox/data:/data
