services:
  base:
    environment:
      - TZ=${HONEYPI_TZ:-'Europe/Amsterdam'}
      - LOG_LEVEL=${HONEYPI_LOG_LEVEL:-info}
      - HONEYPI_DOCKER_REGISTRY=${HONEYPI_DOCKER_REGISTRY:-'127.0.0.1:5000'}
      - ALLOW_EMPTY_PASSWORD=yes
      - AUTHENTIK_REDIS__HOST=redis
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__USER=honeypi
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${HONEYPI_POSTGRES_PASSWORD}
      - AUTHENTIK_SECRET_KEY=BWcOMjZZ+eVjDVVFiFAXKly2xXeyO9XuWZDF39NK7iitDOVp3AxP/XKpYBCKDisx8UVWyyNnS8UcBSGJ
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_INITDB_SKIP_TZINFO=1
      - MARIADB_USER=honeypi
      - MARIADB_PASSWORD=${HONEYPI_MARIADB_PASSWORD}
      - MARIADB_RANDOM_ROOT_PASSWORD=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
      - NEXTCLOUD_DATADIR=${HONEYPI_HOME}/nextcloud/data
      - PHOTOPRISM_ADMIN_USER=honeypi
      - PHOTOPRISM_ADMIN_PASSWORD=${HONEYPI_PHOTOPRISM_PASSWORD}
      - PHOTOPRISM_AUTH_MODE=password
      - PHOTOPRISM_DETECT_NSFW=false
      - PHOTOPRISM_UPLOAD_NSFW=true
      - PHOTOPRISM_DATABASE_DRIVER=mysql
      - PHOTOPRISM_DATABASE_SERVER=mariadb:3306
      - PHOTOPRISM_DATABASE_NAME=photoprism
      - PHOTOPRISM_DATABASE_USER=honeypi
      - PHOTOPRISM_DATABASE_PASSWORD=${HONEYPI_MARIADB_PASSWORD}
      - POSTGRES_USER=honeypi
      - POSTGRES_PASSWORD=${HONEYPI_POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - MONGO_URL=mongodb://mongo:27017/rocketchat
      - MONGO_OPLOG_URL=mongodb://mongo:27017/local
      - DB_ADAPTER=postgresql
      - DB_HOST=postgres
      - DB_USER=honeypi
      - DB_PASS=${HONEYPI_POSTGRES_PASSWORD}
      - DB_NAME=gitlab
      - DB_MYSQL_HOST=mariadb
      - DB_MYSQL_PORT=3306
      - DB_MYSQL_USER=honeypi
      - DB_MYSQL_PASSWORD=${HONEYPI_MARIADB_PASSWORD}
      - DB_MYSQL_NAME=nginxproxymanager
      - MYSQL_HA_DATABASE=homeassistant
      - MYSQL_HA_USER=honeypi
      - MYSQL_HA_PASSWORD=${HONEYPI_MARIADB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITLAB_HTTPS=false
      - SSL_SELF_SIGNED=false
      - GITLAB_HOST=localhost
      - GITLAB_PORT=10080
      - GITLAB_SSH_PORT=10022
      - GITLAB_ROOT_PASSWORD=${HONEYPI_GITLAB_PASSWORD}
      - ROOT_URL=${HONEYPI_ROCKETCHAT_ROOT_URL}
      - PHOTOPRISM_OIDC_URI=${HONEYPI_PHOTOPRISM_OIDC_URI}
      - PHOTOPRISM_OIDC_CLIENT=${HONEYPI_PHOTOPRISM_OIDC_CLIENT}
      - PHOTOPRISM_OIDC_SECRET=${HONEYPI_PHOTOPRISM_OIDC_SECRET}
      - PHOTOPRISM_OIDC_PROVIDER=${HONEYPI_PHOTOPRISM_OIDC_PROVIDER}
      - PHOTOPRISM_OIDC_REDIRECT=${HONEYPI_PHOTOPRISM_OIDC_REDIRECT}
      - PHOTOPRISM_OIDC_REGISTER=${HONEYPI_PHOTOPRISM_OIDC_REGISTER}
      - PHOTOPRISM_OIDC_WEBDAV=${HONEYPI_PHOTOPRISM_OIDC_WEBDAV}
      - PHOTOPRISM_SITE_URL=${HONEYPI_PHOTOPRISM_SITE_URL}
      - AUTH_TYPE=Digest
      - USERNAME=${HONEYPI_WEBDAV_USERNAME}
      - PASSWORD=${HONEYPI_WEBDAV_PASSWORD}
      - CONNECTIONS=con1,con2,con3
      - LABEL_con1=MariaDB
      - SERVER_con1=mariadb
      - USER_con1=honeypi
      - PASSWORD_con1=${HONEYPI_MARIADB_PASSWORD}
      - ENGINE_con1=mysql@dbgate-plugin-mysql
      - LABEL_con2=Postgres
      - SERVER_con2=postgres
      - USER_con2=honeypi
      - PASSWORD_con2=${HONEYPI_POSTGRES_PASSWORD}
      - ENGINE_con2=postgres@dbgate-plugin-postgres
      - LABEL_con3=MongoDB
      - URL_con3=mongodb://mongo:27017
      - ENGINE_con3=mongo@dbgate-plugin-mongo
    env_file:
      - ./../${HONEYPI_ENVIRONMENT}.env
