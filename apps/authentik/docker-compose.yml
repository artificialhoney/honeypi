---

services:
  postgresql:
    image: library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${HONEYPI_AUTHENTIK_POSTGRESQL_PASSWORD}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
    extends:
      file: ../../commons/compose.yml
      service: base
  redis:
    image: library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
  server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    container_name: authentik
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${HONEYPI_AUTHENTIK_POSTGRESQL_PASSWORD}
    volumes:
      - ${HONEYPI_HOME}/authentik/media:/media
      - ${HONEYPI_HOME}/authentik/templates:/templates
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - postgresql
      - redis
    extends:
      file: ../../commons/compose.yml
      service: base
  worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${HONEYPI_AUTHENTIK_POSTGRESQL_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HONEYPI_HOME}/authentik/media:/media
      - ${HONEYPI_HOME}/authentik/certs:/certs
      - ${HONEYPI_HOME}/authentik/templates:/templates
    depends_on:
      - postgresql
      - redis
    extends:
      file: ../../commons/compose.yml
      service: base

volumes:
  database:
    driver: local
  redis:
    driver: local
