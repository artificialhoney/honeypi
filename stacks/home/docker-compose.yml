services:
  mariadb:
    extends:
      file: ../../services/mariadb/docker-compose.yml
      service: mariadb
  mongo:
    extends:
      file: ../../services/mongo/docker-compose.yml
      service: mongo
  postgres:
    extends:
      file: ../../services/postgres/docker-compose.yml
      service: postgres
  redis:
    extends:
      file: ../../services/redis/docker-compose.yml
      service: redis
  gitlab:
    extends:
      file: ../../services/gitlab/docker-compose.yml
      service: gitlab
    ports:
      - 10080:80
      - 10022:22
    depends_on:
      - postgres
  rocketchat:
    extends:
      file: ../../services/rocketchat/docker-compose.yml
      service: rocketchat
    expose:
      - 3000
    ports:
      - 3000:3000
    depends_on:
      - rocketchat-mongo-init
  rocketchat-mongo-init:
    extends:
      file: ../../services/rocketchat/docker-compose.yml
      service: rocketchat-mongo-init
    depends_on:
      - mongo
  homeassistant:
    extends:
      file: ../../services/homeassistant/docker-compose.yml
      service: homeassistant
    ports:
      - 8123:8123
  filestash:
    extends:
      file: ../../services/filestash/docker-compose.yml
      service: filestash
    ports:
      - 8334:8334
  photoprism:
    extends:
      file: ../../services/photoprism/docker-compose.yml
      service: photoprism
    ports:
      - 2342:2342
    depends_on:
      - mariadb
  mediamtx:
    extends:
      file: ../../services/mediamtx/docker-compose.yml
      service: mediamtx
    network_mode: host
  authentik-worker:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik-worker
    depends_on:
      - authentik
  authentik:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - redis
      - postgres
  nginxproxymanager:
    extends:
      file: ../../services/nginxproxymanager/docker-compose.yml
      service: nginxproxymanager
    ports:
      - 80:80
      - 81:81
      - 443:443
    depends_on:
      - mariadb
  dbgate:
    extends:
      file: ../../services/dbgate/docker-compose.yml
      service: dbgate
    ports:
      - 4000:3000
    depends_on:
      - mariadb
      - mongo
      - postgres
  webdav:
    extends:
      file: ../../services/webdav/docker-compose.yml
      service: webdav
    volumes:
      - /media/hive/home/sk:/media
    ports:
      - 8080:80