services:
  mariadb:
    extends:
      file: ../../services/mariadb/docker-compose.yml
      service: mariadb
  mongo:
    extends:
      file: ../../services/mongo/docker-compose.yml
      service: mongo
  postgres:
    extends:
      file: ../../services/postgres/docker-compose.yml
      service: postgres
  redis:
    extends:
      file: ../../services/redis/docker-compose.yml
      service: redis
  gitlab:
    extends:
      file: ../../services/gitlab/docker-compose.yml
      service: gitlab
    environment:
      - GITLAB_PORT=10080
      - GITLAB_SSH_PORT=10022
      - GITLAB_HTTPS=false
    ports:
      - 10080:80
      - 10022:22
    depends_on:
      - postgres
  rocketchat:
    extends:
      file: ../../services/rocketchat/docker-compose.yml
      service: rocketchat
    expose:
      - 3000
    ports:
      - 3000:3000
    depends_on:
      - rocketchat-mongo-init
  rocketchat-mongo-init:
    extends:
      file: ../../services/rocketchat/docker-compose.yml
      service: rocketchat-mongo-init
    depends_on:
      - mongo
  homeassistant:
    extends:
      file: ../../services/homeassistant/docker-compose.yml
      service: homeassistant
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    ports:
      - 8123:8123
  filestash:
    extends:
      file: ../../services/filestash/docker-compose.yml
      service: filestash
    ports:
      - 8334:8334
  photoprism:
    extends:
      file: ../../services/photoprism/docker-compose.yml
      service: photoprism
    volumes:
      - ${HONEYPI_HOME}/photoprism/originals:/photoprism/originals
      - ${HONEYPI_HOME}/syncthing/SD:/photoprism/originals/SD
      - ${HONEYPI_HOME}/photoprism/storage:/photoprism/storage
    ports:
      - 2342:2342
    depends_on:
      - mariadb
  mediamtx:
    extends:
      file: ../../services/mediamtx/docker-compose.yml
      service: mediamtx
    network_mode: host
  authentik-worker:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik-worker
    depends_on:
      - authentik
  authentik:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - redis
      - postgres
  nginxproxymanager:
    extends:
      file: ../../services/nginxproxymanager/docker-compose.yml
      service: nginxproxymanager
    ports:
      - 80:80
      - 81:81
      - 443:443
    depends_on:
      - mariadb
  dbgate:
    extends:
      file: ../../services/dbgate/docker-compose.yml
      service: dbgate
    ports:
      - 4000:3000
    depends_on:
      - mariadb
      - mongo
      - postgres
  syncthing:
    extends:
      file: ../../services/syncthing/docker-compose.yml
      service: syncthing
    ports:
        - 8384:8384 # Web UI
        - 22001:22000/tcp # TCP file transfers
        - 22001:22000/udp # QUIC file transfers
        - 21027:21027/udp # Receive local discovery broadcasts