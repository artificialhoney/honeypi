services:
  mariadb:
    extends:
      file: ../../services/mariadb/docker-compose.yml
      service: mariadb
  postgres:
    extends:
      file: ../../services/postgres/docker-compose.yml
      service: postgres
  redis:
    extends:
      file: ../../services/redis/docker-compose.yml
      service: redis
  elasticsearch:
    extends:
      file: ../../services/elasticsearch/docker-compose.yml
      service: elasticsearch
  gitea:
    extends:
      file: ../../services/gitea/docker-compose.yml
      service: gitea
    ports:
      - 9000:3000
      - 2222:2222
  woodpecker-server:
    extends:
      file: ../../services/woodpecker/docker-compose.yml
      service: woodpecker-server
    ports:
      - 8000:8000
  woodpecker-agent:
    extends:
      file: ../../services/woodpecker/docker-compose.yml
      service: woodpecker-agent
  mastodon:
    extends:
      file: ../../services/mastodon/docker-compose.yml
      service: mastodon
    ports:
      - 3000:3000
    depends_on:
      - mastodon-init
  mastodon-init:
    extends:
      file: ../../services/mastodon/docker-compose.yml
      service: mastodon-init
    depends_on:
      - redis
      - postgres
  mastodon-streaming:
    extends:
      file: ../../services/mastodon/docker-compose.yml
      service: mastodon-streaming
    depends_on:
      - redis
      - postgres
  mastodon-sidekiq:
    extends:
      file: ../../services/mastodon/docker-compose.yml
      service: mastodon-sidekiq
    depends_on:
      - redis
      - postgres
  homeassistant:
    extends:
      file: ../../services/homeassistant/docker-compose.yml
      service: homeassistant
    ports:
      - 8123:8123
  photoprism:
    extends:
      file: ../../services/photoprism/docker-compose.yml
      service: photoprism
    ports:
      - 2342:2342
    depends_on:
      - mariadb
  n8n:
    extends:
      file: ../../services/n8n/docker-compose.yml
      service: n8n
    ports:
      - 5678:5678
  authentik-worker:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik-worker
    depends_on:
      - authentik
  authentik:
    extends:
      file: ../../services/authentik/docker-compose.yml
      service: authentik
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - redis
      - postgres
  nginxproxymanager:
    extends:
      file: ../../services/nginxproxymanager/docker-compose.yml
      service: nginxproxymanager
    ports:
      - 80:80
      - 81:81
      - 443:443
    depends_on:
      - mariadb
  dbgate:
    extends:
      file: ../../services/dbgate/docker-compose.yml
      service: dbgate
    ports:
      - 4000:3000
    depends_on:
      - mariadb
      - postgres